<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Black background -->
  <rect width="512" height="512" rx="112" fill="#000000"/>

  <!-- Top bump (photo slot) -->
  <rect x="184" y="113" width="144" height="51" rx="25" fill="white"/>

  <!-- Camera body -->
  <rect x="92" y="154" width="328" height="226" rx="40" fill="white"/>

  <!-- Lens outer -->
  <circle cx="256" cy="267" r="72" fill="#000000"/>
  <!-- Lens ring -->
  <circle cx="256" cy="267" r="72" fill="none" stroke="white" stroke-width="12"/>
  <!-- Lens inner -->
  <circle cx="256" cy="267" r="46" fill="#000000"/>
  <circle cx="256" cy="267" r="25" fill="white" opacity="0.12"/>

  <!-- Viewfinder -->
  <rect x="308" y="175" width="72" height="40" rx="10" fill="#000000"/>

  <!-- Flash -->
  <rect x="124" y="175" width="52" height="40" rx="10" fill="#000000"/>

  <!-- Curtain lines -->
  <line x1="128" y1="390" x2="384" y2="390" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="148" y1="418" x2="364" y2="418" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
</svg>
